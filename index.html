<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Digital</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    
    <main>
        <div class="top-bar">
            <h1>Calculadora Digital</h1>
            <button class="theme-btn" onclick="toggleTheme()">
                🌙 Escuro
            </button>
        </div>
        <div class="calculadora">

            <input id="resultado" type="text" class="resultado" placeholder="0" maxlength="5" disabled>

            <button onclick="calcular('acao', 'c')" class="btn clear">C</button>
            <button class="btn backspace" onclick="calcular('acao', 'back')">⌫</button>
            <button onclick="calcular('acao', '/')" class="btn operador">/</button>
            <button onclick="calcular('acao', '*')" class="btn operador">x</button>

            <button onclick="calcular('valor', 7)" class="btn">7</button>
            <button onclick="calcular('valor', 8)" class="btn">8</button>
            <button onclick="calcular('valor', 9)" class="btn">9</button>
            <button onclick="calcular('acao', '-')" class="btn operador">-</button>

            <button onclick="calcular('valor', 4)" class="btn">4</button>
            <button onclick="calcular('valor', 5)" class="btn">5</button>
            <button onclick="calcular('valor', 6)" class="btn">6</button>
            <button onclick="calcular('acao', '+')" class="btn operador">+</button>

            <button onclick="calcular('valor', 1)" class="btn">1</button>
            <button onclick="calcular('valor', 2)" class="btn">2</button>
            <button onclick="calcular('valor', 3)" class="btn">3</button>
            <button onclick="calcular('acao', '=')" class="btn enter operador">=</button>

            <button onclick="calcular('valor', 0)" class="btn zero">0</button>
            <button onclick="calcular('acao', '.')" class="btn">.</button>

        </div>

        
    
    
        </div>
    </main>
    <footer>
        <div class="footer">
            <p><a>By: João Paulo</a></p>
        </div>
    </footer>
    <script src="assets/js/script.js"></script>
</body>
</html>
