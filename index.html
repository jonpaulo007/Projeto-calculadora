<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Digital</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    
    <main>
        <div class="top-bar">
            <h1>Calculadora Digital</h1>
            <button class="theme-btn" onclick="toggleTheme()">
                🌙 Escuro
            </button>
        </div>
        <div class="calculadora">

            <input type="text" class="resultado" placeholder="0" disabled>

            <button class="btn clear">C</button>
            <button class="btn operador">/</button>
            <button class="btn operador">x</button>

            <button class="btn">7</button>
            <button class="btn">8</button>
            <button class="btn">9</button>
            <button class="btn operador">-</button>

            <button class="btn">4</button>
            <button class="btn">5</button>
            <button class="btn">6</button>
            <button class="btn operador">+</button>

            <button class="btn">1</button>
            <button class="btn">2</button>
            <button class="btn">3</button>
            <button class="btn enter operador">=</button>

            <button class="btn zero">0</button>
            <button class="btn">.</button>

        </div>

        
    
    
        </div>
    </main>
    <footer>
        <div class="footer">
            <p><a>By: João Paulo</a></p>
        </div>
    </footer>
    <script src="assets/js/script.js"></script>
</body>
</html>
